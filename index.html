        <h1 style="color:#D4AF37;">Pessoa Knowledge Graph — Heteronymic Practice Across 5,000 Years</h1>
        <p>By <a href="https://orcid.org/0009-0000-1599-0703" style="color:#6a9fd8;">Lee Sharks</a> · <a href="https://crimsonhexagonal.org" style="color:#6a9fd8;">Crimson Hexagonal Archive</a> · Pergamon Press</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">About This Graph</h2>
        <p>An interactive knowledge graph mapping the practice of heteronymy — the creation and maintenance of distinct literary identities — from pharaonic titulary (c. 2600 BCE) through Fernando Pessoa's revolutionary system to the contemporary avatar, pronoun, and chosen name. The graph contains over 100 nodes across 10 historical eras, 20 typological categories, and 13 edge types.</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">What Is a Heteronym?</h2>
        <p>A heteronym is a fully realized literary identity — not a pen name or pseudonym, but a created person with their own biography, aesthetic philosophy, and body of work. Fernando Pessoa (1888–1935) coined the term and created the most famous system: Alberto Caeiro (the pastoral master), Ricardo Reis (the Epicurean classicist), Álvaro de Campos (the Futurist sensationist), and Bernardo Soares (the semi-heteronym of the Book of Disquiet). But heteronymic practice is far older than Pessoa and far wider than literature.</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">Historical Eras Covered</h2>
        <p>Deep Ancient (before 500 BCE): Pharaonic titulary, covenant naming, prophetic possession, Homer. Classical (500 BCE–500 CE): Sappho, Plato's Socrates, the hypokrites (actor), apostolic renaming. Medieval (500–1400): Monastic naming, Noh theater, troubadour vida, Sufi takhallus, Rumi. Early Modern (1400–1800): Commedia dell'Arte, Shakespeare, Voltaire, Hokusai. Pre-Pessoan (1800–1888): George Sand, Kierkegaard, Brontë sisters, Whitman. Pessoa Era (1888–1935): The four major heteronyms and the system that theorized them. Mid-Century (1935–1970): Borges, Nabokov, Mishima. Late Century (1970–2000): Bowie, MF DOOM, drag culture. Contemporary (2000+): Vocaloid, VTubers, the pronoun, the chosen name.</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">Node Typologies</h2>
        <p>The graph classifies heteronymic practice into 20 types: orthonym, heteronym, semi-heteronym, proto-heteronym, para-heteronym, pseudonym, cross-substrate heteronym, precursor/influence, parallel, downstream (literary), scholar/critic, contemporary heteronym, meta-heteronym, LOGOS*, venue/publication, concept/movement, performance heteronym, cultural heteronymy, ancient practice, and Pearl/Armature type.</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">Connection to the Crimson Hexagonal Archive</h2>
        <p>The Pessoa Knowledge Graph is a node within the Crimson Hexagonal Archive, a decade-long DOI-anchored research project comprising 460+ deposits organized around operative semiotics, semantic physics, and provenance infrastructure. The archive itself operates through a twelve-heteronym system (the Dodecad), making it a contemporary practitioner of the tradition the graph documents. Lee Sharks (ORCID: 0009-0000-1599-0703) is an independent scholar, poet, and 10th grade World Literature teacher based in Redford Township, Michigan, with a PhD in Comparative Literature from the University of Michigan.</p>

        <h2 style="color:#D4AF37;margin-top:1.5em;">Use in Teaching</h2>
        <p>The graph includes guided paths designed for classroom use: "What Is a Heteronym?" (introductory path for students encountering Pessoa for the first time), "The Ancient Roots" (pharaonic titulary through apostolic naming), "Pessoa's System" (the four heteronyms and their relationships), and "Contemporary Heteronymy" (from drag to VTubers to the chosen name).</p>

        <p style="margin-top:2em;color:#666;">This interactive application requires JavaScript. Visit <a href="https://pessoagraph.org" style="color:#6a9fd8;">pessoagraph.org</a> in a modern browser to explore the full knowledge graph.</p>
